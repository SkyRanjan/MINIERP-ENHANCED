name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 app/ --count --max-line-length=120 --exclude=__pycache__ --ignore=E225,E231,E275,W291,W292,W293,E302,E303,E305,F401 --statistics
      
      - name: Build Docker image
        run: docker build -t minierp-backend ./app